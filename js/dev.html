<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lightener Curve Card - Dev Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 40px;
        background: #1a1a1a;
        font-family: "Roboto", "Segoe UI", sans-serif;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 32px;
        min-height: 100vh;
      }
      .preview-container {
        width: 400px;
      }
      .label {
        color: #666;
        font-size: 12px;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .light-theme {
        --primary-text-color: #212121;
        --secondary-text-color: #616161;
        --card-background-color: #fff;
        --ha-card-background: #fff;
        --divider-color: rgba(0, 0, 0, 0.12);
        --ha-card-border-radius: 12px;
        --ha-card-box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        --error-color: #db4437;
        --success-color: #2563eb;
      }
      .dark-theme {
        --primary-text-color: #e1e1e1;
        --secondary-text-color: #9e9e9e;
        --card-background-color: #1c1c1c;
        --ha-card-background: #1c1c1c;
        --divider-color: rgba(255, 255, 255, 0.12);
        --ha-card-border-radius: 12px;
        --ha-card-box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
        --error-color: #ef5350;
        --success-color: #2563eb;
      }
    </style>
  </head>
  <body>
    <div class="preview-container light-theme">
      <div class="label">Light Mode</div>
      <lightener-curve-card id="card-light"></lightener-curve-card>
    </div>
    <div class="preview-container dark-theme">
      <div class="label">Dark Mode</div>
      <lightener-curve-card id="card-dark"></lightener-curve-card>
    </div>

    <script type="module">
      import "../custom_components/lightener/frontend/lightener-curve-card.js";

      await customElements.whenDefined("lightener-curve-card");

      const hass = {
        user: { is_admin: true },
        states: {},
        language: "en",
        themes: { default_theme: "default" },
      };

      const cards = document.querySelectorAll("lightener-curve-card");
      for (const card of cards) {
        card.setConfig({ type: "custom:lightener-curve-card" });
        setTimeout(() => { card.hass = hass; }, 0);
      }

      // Sync both cards: after any interaction, copy internal state
      const cardLight = document.getElementById("card-light");
      const cardDark = document.getElementById("card-dark");
      let syncing = false;
      function syncCards(source, target) {
        if (syncing) return;
        syncing = true;
        target._curves = JSON.parse(JSON.stringify(source._curves));
        target._selectedCurveId = source._selectedCurveId;
        target._originalCurves = JSON.parse(JSON.stringify(source._originalCurves));
        target.requestUpdate();
        syncing = false;
      }
      for (const evt of ["pointerup", "click", "dblclick", "contextmenu", "keyup"]) {
        cardLight.addEventListener(evt, () => requestAnimationFrame(() => syncCards(cardLight, cardDark)));
        cardDark.addEventListener(evt, () => requestAnimationFrame(() => syncCards(cardDark, cardLight)));
      }
    </script>
  </body>
</html>
