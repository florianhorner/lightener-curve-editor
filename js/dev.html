<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lightener Curve Card - Dev Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 40px;
        background: #1a1a1a;
        font-family: "Roboto", "Segoe UI", sans-serif;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 32px;
        min-height: 100vh;
      }
      .preview-container {
        width: 400px;
      }
      .label {
        color: #666;
        font-size: 12px;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .scenario-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        gap: 8px;
        padding: 10px;
        background: #111;
        border-bottom: 1px solid #333;
        z-index: 100;
      }
      .scenario-btn {
        font-family: inherit;
        font-size: 11px;
        padding: 5px 12px;
        border-radius: 6px;
        border: 1px solid #444;
        background: #222;
        color: #aaa;
        cursor: pointer;
      }
      .scenario-btn:hover { border-color: #666; color: #fff; }
      .scenario-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }
      body { padding-top: 56px; }
      .light-theme {
        --primary-text-color: #212121;
        --secondary-text-color: #616161;
        --card-background-color: #fff;
        --ha-card-background: #fff;
        --divider-color: rgba(0, 0, 0, 0.12);
        --ha-card-border-radius: 12px;
        --ha-card-box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        --error-color: #db4437;
        --success-color: #2563eb;
      }
      .dark-theme {
        --primary-text-color: #e1e1e1;
        --secondary-text-color: #9e9e9e;
        --card-background-color: #1c1c1c;
        --ha-card-background: #1c1c1c;
        --divider-color: rgba(255, 255, 255, 0.12);
        --ha-card-border-radius: 12px;
        --ha-card-box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
        --error-color: #ef5350;
        --success-color: #2563eb;
      }
    </style>
  </head>
  <body>
    <div class="scenario-bar">
      <button class="scenario-btn active" data-scenario="default">3 Lights</button>
      <button class="scenario-btn" data-scenario="two">2 Lights</button>
      <button class="scenario-btn" data-scenario="many">20 Lights</button>
      <button class="scenario-btn" data-scenario="long-ids">Long IDs</button>
    </div>

    <div class="preview-container light-theme">
      <div class="label">Light Mode</div>
      <lightener-curve-card id="card-light"></lightener-curve-card>
    </div>
    <div class="preview-container dark-theme">
      <div class="label">Dark Mode</div>
      <lightener-curve-card id="card-dark"></lightener-curve-card>
    </div>

    <script type="module">
      import "../custom_components/lightener/frontend/lightener-curve-card.js";

      await customElements.whenDefined("lightener-curve-card");

      const COLORS = [
        "#42a5f5", "#ef5350", "#5c6bc0", "#ffa726", "#ab47bc",
        "#26c6da", "#ec407a", "#8d6e63", "#ffca28", "#7e57c2",
      ];

      function makeCurve(id, name, points, colorIdx) {
        return {
          entityId: id,
          friendlyName: name,
          controlPoints: points.map(([l, t]) => ({ lightener: l, target: t })),
          visible: true,
          color: COLORS[colorIdx % COLORS.length],
        };
      }

      const scenarios = {
        default: [
          makeCurve("light.ceiling_light", "Ceiling Light", [[0,0],[20,0],[60,80],[100,100]], 0),
          makeCurve("light.sofa_lamp", "Sofa Lamp", [[0,0],[10,50],[40,100],[70,100],[100,60]], 1),
          makeCurve("light.led_strip", "LED Strip", [[0,0],[1,1],[100,100]], 2),
        ],
        two: [
          makeCurve("light.bedroom_main", "Bedroom Main", [[0,0],[30,20],[70,90],[100,100]], 0),
          makeCurve("light.bedside_lamp", "Bedside Lamp", [[0,0],[5,60],[50,100],[100,80]], 1),
        ],
        many: Array.from({ length: 20 }, (_, i) => {
          const names = [
            "Ceiling", "Floor Lamp", "LED Strip", "Desk Lamp", "Wall Sconce",
            "Pendant", "Spotlight A", "Spotlight B", "Under Cabinet", "Accent Left",
            "Accent Right", "Hallway", "Bathroom", "Mirror Light", "Closet",
            "Reading Lamp", "TV Backlight", "Kitchen Island", "Dining Table", "Entry",
          ];
          const mid = 20 + Math.round(Math.random() * 60);
          return makeCurve(
            `light.room_${names[i].toLowerCase().replace(/\s+/g, "_")}`,
            names[i],
            [[0,0],[mid, Math.round(20 + Math.random() * 80)],[100, Math.round(50 + Math.random() * 50)]],
            i
          );
        }),
        "long-ids": [
          makeCurve(
            "light.ground_floor_living_room_main_ceiling_chandelier_warm_white",
            "Ground Floor Living Room Main Ceiling Chandelier (Warm White)",
            [[0,0],[25,10],[50,60],[75,90],[100,100]], 0
          ),
          makeCurve(
            "light.second_floor_master_bedroom_bedside_table_lamp_left_side",
            "Second Floor Master Bedroom Bedside Table Lamp (Left)",
            [[0,0],[10,40],[60,100],[100,80]], 1
          ),
          makeCurve(
            "light.basement_home_theater_ambient_led_strip_behind_screen",
            "Basement Home Theater Ambient LED Strip (Behind Screen)",
            [[0,0],[5,80],[30,100],[100,100]], 2
          ),
        ],
      };

      const hass = {
        user: { is_admin: true },
        states: {},
        language: "en",
        themes: { default_theme: "default" },
      };

      const cardLight = document.getElementById("card-light");
      const cardDark = document.getElementById("card-dark");

      function loadScenario(name) {
        const curves = JSON.parse(JSON.stringify(scenarios[name]));
        for (const card of [cardLight, cardDark]) {
          card._curves = JSON.parse(JSON.stringify(curves));
          card._originalCurves = JSON.parse(JSON.stringify(curves));
          card._selectedCurveId = null;
          card.requestUpdate();
        }
        document.querySelectorAll(".scenario-btn").forEach((b) => {
          b.classList.toggle("active", b.dataset.scenario === name);
        });
      }

      for (const card of [cardLight, cardDark]) {
        card.setConfig({ type: "custom:lightener-curve-card" });
        setTimeout(() => { card.hass = hass; }, 0);
      }

      document.querySelectorAll(".scenario-btn").forEach((btn) => {
        btn.addEventListener("click", () => loadScenario(btn.dataset.scenario));
      });

      // Sync both cards
      let syncing = false;
      function syncCards(source, target) {
        if (syncing) return;
        syncing = true;
        target._curves = JSON.parse(JSON.stringify(source._curves));
        target._selectedCurveId = source._selectedCurveId;
        target._originalCurves = JSON.parse(JSON.stringify(source._originalCurves));
        target.requestUpdate();
        syncing = false;
      }
      for (const evt of ["pointerup", "click", "dblclick", "contextmenu", "keyup"]) {
        cardLight.addEventListener(evt, () => requestAnimationFrame(() => syncCards(cardLight, cardDark)));
        cardDark.addEventListener(evt, () => requestAnimationFrame(() => syncCards(cardDark, cardLight)));
      }
    </script>
  </body>
</html>
