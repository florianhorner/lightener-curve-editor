name: "Release"

on:
  release:
    types:
      - "published"

permissions: {}

jobs:
  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v4"

      - name: "Adjust version number"
        shell: "bash"
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          yq -i -o json ".version=\"${TAG_NAME}\"" \
            "${{ github.workspace }}/custom_components/lightener/manifest.json"

      - name: "ZIP the integration directory"
        shell: "bash"
        run: |
          cd "${{ github.workspace }}/custom_components/lightener"
          zip lightener.zip -r ./

      - name: "Validate ZIP structure"
        shell: "bash"
        run: |
          # HACS zip_release extracts directly into custom_components/<domain>/
          # Files MUST be at the zip root — no nested custom_components/ prefix.
          # A wrong structure silently breaks the integration ("Integration not found").
          ZIP_PATH="${{ github.workspace }}/custom_components/lightener/lightener.zip"
          ZIP_ENTRIES="$(unzip -Z1 "${ZIP_PATH}")"
          if printf '%s\n' "${ZIP_ENTRIES}" | grep -q '^custom_components/'; then
            echo "::error::ZIP contains nested custom_components/ path. HACS will extract this wrong."
            echo "Files in zip:"
            unzip -l "${ZIP_PATH}"
            exit 1
          fi
          if ! printf '%s\n' "${ZIP_ENTRIES}" | grep -qx 'manifest.json'; then
            echo "::error::ZIP is missing manifest.json at root level."
            exit 1
          fi
          echo "✓ ZIP structure valid — manifest.json at root, no nested paths"

      - name: "Upload the ZIP file to the release"
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: ${{ github.workspace }}/custom_components/lightener/lightener.zip
